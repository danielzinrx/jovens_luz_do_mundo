<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventos — Jovens Luz do Mundo</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/svg+xml" href="img/gemini-svg.svg" />
    <style>
        @keyframes pulse {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .7
            }
        }

        .lp {
            border-radius: 8px;
            animation: pulse 1.4s ease-in-out infinite;
            background: var(--cinza-suave);
        }

        /* Filtros */
        .filtros {
            display: flex;
            gap: 8px;
            padding: 14px 16px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filtros::-webkit-scrollbar {
            display: none;
        }

        .filtro-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--azul-royal);
            background: transparent;
            color: var(--azul-royal);
            font-family: var(--fonte-titulo);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transicao);
            white-space: nowrap;
        }

        .filtro-btn.ativo {
            background: var(--azul-royal);
            color: #fff;
        }

        /* Card evento */
        .evento-card {
            background: var(--branco-puro);
            border-radius: var(--raio);
            margin: 12px 16px 0;
            box-shadow: var(--sombra);
            overflow: hidden;
            transition: var(--transicao);
            cursor: pointer;
            border: 1.5px solid transparent;
        }

        .evento-card:hover {
            transform: translateY(-2px);
            border-color: var(--dourado-claro);
        }

        .evento-card.destaque {
            border-color: var(--dourado);
        }

        .evento-topo {
            background: linear-gradient(135deg, var(--azul-royal-escuro), var(--azul-royal));
            padding: 14px 16px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .evento-data-box {
            background: rgba(201, 168, 76, 0.20);
            border: 1px solid rgba(201, 168, 76, 0.40);
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
            flex-shrink: 0;
        }

        .evento-data-box .dia {
            font-family: var(--fonte-titulo);
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .evento-data-box .mes {
            font-size: 10px;
            color: var(--dourado-claro);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .evento-topo-info h3 {
            font-family: var(--fonte-titulo);
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 3px;
            line-height: 1.3;
        }

        .evento-topo-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
        }

        .evento-corpo {
            padding: 14px 16px;
        }

        .evento-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--cinza-texto);
        }

        .evento-desc {
            font-size: 13px;
            color: var(--cinza-texto);
            line-height: 1.65;
        }

        .destaque-badge {
            display: inline-block;
            background: rgba(201, 168, 76, 0.15);
            color: var(--dourado-escuro);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 8px;
            letter-spacing: 0.04em;
        }

        .cat-badge {
            display: inline-block;
            background: rgba(27, 79, 155, 0.10);
            color: var(--azul-royal);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }

        /* Passados */
        .evento-card.passado {
            opacity: 0.6;
        }

        .evento-card.passado .evento-topo {
            background: linear-gradient(135deg, #555, #777);
        }

        /* Vazio */
        .vazio {
            text-align: center;
            padding: 40px 20px;
        }

        .vazio-emoji {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .vazio h4 {
            font-family: var(--fonte-titulo);
            font-size: 16px;
            color: var(--texto-escuro);
            margin-bottom: 6px;
        }

        .vazio p {
            font-size: 13px;
            color: var(--cinza-texto);
        }

        /* Seção título */
        .sec-titulo {
            font-family: var(--fonte-titulo);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.10em;
            color: var(--cinza-texto);
            text-transform: uppercase;
            padding: 18px 16px 4px;
        }
    </style>
</head>

<body>

    <header class="page-header">
        <a href="../index.html" class="voltar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
                stroke-linecap="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </a>
        <h2>Eventos</h2>
    </header>

    <div class="filtros">
        <button class="filtro-btn ativo" onclick="filtrar('todos',this)">Todos</button>
        <button class="filtro-btn" onclick="filtrar('encontro',this)">Encontros</button>
        <button class="filtro-btn" onclick="filtrar('missa',this)">Missas</button>
        <button class="filtro-btn" onclick="filtrar('retiro',this)">Retiros</button>
        <button class="filtro-btn" onclick="filtrar('formacao',this)">Formação</button>
        <button class="filtro-btn" onclick="filtrar('servico',this)">Serviço</button>
    </div>

    <div id="lista-eventos" style="padding-bottom:90px;">
        <!-- Loading skeleton -->
        <div style="margin:16px 16px 0;">
            <div class="lp" style="height:120px;margin-bottom:12px;"></div>
            <div class="lp" style="height:120px;margin-bottom:12px;"></div>
            <div class="lp" style="height:120px;"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="../index.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg><span>Início</span></a>
        <a href="biblia.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg><span>Bíblia</span></a>
        <a href="terco.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <circle cx="12" cy="4" r="2" />
                <circle cx="20" cy="12" r="2" />
                <circle cx="12" cy="20" r="2" />
                <circle cx="4" cy="12" r="2" />
                <line x1="12" y1="6" x2="12" y2="9" />
                <line x1="15" y1="12" x2="18" y2="12" />
                <line x1="12" y1="15" x2="12" y2="18" />
                <line x1="6" y1="12" x2="9" y2="12" />
            </svg><span>Terço</span></a>
        <a href="santos.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4" />
                <path d="M6 20v-2a6 6 0 0 1 12 0v2" />
            </svg><span>Santos</span></a>
        <a href="avisos.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg><span>Avisos</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBXlGzF46hAmVpm7mJ0EEKr6y2-woIClo",
            authDomain: "jovens-luz-do-mundo-608cd.firebaseapp.com",
            projectId: "jovens-luz-do-mundo-608cd",
            storageBucket: "jovens-luz-do-mundo-608cd.firebasestorage.app",
            messagingSenderId: "519874530522",
            appId: "1:519874530522:web:50adce994ab335fc6829e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const mesesAbrev = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const categoriasLabel = {
            encontro: 'Encontro', missa: 'Missa', retiro: 'Retiro',
            formacao: 'Formação', servico: 'Serviço', festivo: 'Festivo', outro: 'Outro'
        };

        let todosEventos = [];
        let filtroAtivo = 'todos';

        async function carregarEventos() {
            try {
                const q = query(collection(db, 'eventos'), orderBy('data', 'asc'));
                const snap = await getDocs(q);
                todosEventos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderEventos();
            } catch (e) {
                document.getElementById('lista-eventos').innerHTML =
                    '<div class="vazio"><div class="vazio-emoji">⚠️</div><h4>Erro ao carregar</h4><p>Verifique sua conexão.</p></div>';
            }
        }

        function renderEventos() {
            const lista = document.getElementById('lista-eventos');
            const hoje = new Date().toISOString().split('T')[0];

            let filtrados = filtroAtivo === 'todos'
                ? todosEventos
                : todosEventos.filter(e => e.categoria === filtroAtivo);

            // Separa próximos e passados
            const proximos = filtrados.filter(e => e.data >= hoje);
            const passados = filtrados.filter(e => e.data < hoje);

            if (filtrados.length === 0) {
                lista.innerHTML = `<div class="vazio">
        <div class="vazio-emoji">📅</div>
        <h4>Nenhum evento encontrado</h4>
        <p>Novos eventos serão publicados em breve pela comissão.</p>
      </div>`;
                return;
            }

            lista.innerHTML = '';

            // Destaques primeiro
            const destaques = proximos.filter(e => e.destaque);
            if (destaques.length) {
                lista.innerHTML += '<div class="sec-titulo">✦ Em destaque</div>';
                destaques.forEach(e => lista.appendChild(criarCard(e, false)));
            }

            // Próximos
            const normais = proximos.filter(e => !e.destaque);
            if (normais.length) {
                lista.innerHTML += '<div class="sec-titulo">Próximos eventos</div>';
                normais.forEach(e => lista.appendChild(criarCard(e, false)));
            }

            // Passados
            if (passados.length) {
                lista.innerHTML += '<div class="sec-titulo" style="opacity:.6;">Eventos anteriores</div>';
                passados.forEach(e => lista.appendChild(criarCard(e, true)));
            }
        }

        function criarCard(ev, passado) {
            const [ano, mes, dia] = (ev.data || '----  --  --').split('-');
            const card = document.createElement('div');
            card.className = `evento-card${ev.destaque ? ' destaque' : ''}${passado ? ' passado' : ''}`;
            card.innerHTML = `
      <div class="evento-topo">
        <div class="evento-data-box">
          <div class="dia">${dia || '--'}</div>
          <div class="mes">${mesesAbrev[parseInt(mes) - 1] || '--'}</div>
        </div>
        <div class="evento-topo-info">
          <h3>${ev.titulo}</h3>
          <p>${ev.hora ? ev.hora + 'h · ' : ''}${ev.local || ''}</p>
        </div>
      </div>
      <div class="evento-corpo">
        ${ev.destaque ? '<div class="destaque-badge">⭐ Evento em destaque</div>' : ''}
        <div class="evento-meta">
          <span class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${dia} de ${meses[parseInt(mes) - 1]} de ${ano}
            <span class="cat-badge">${categoriasLabel[ev.categoria] || ev.categoria || ''}</span>
          </span>
        </div>
        ${ev.descricao ? `<div class="evento-desc">${ev.descricao}</div>` : ''}
      </div>`;
            return card;
        }

        window.filtrar = function (cat, btn) {
            filtroAtivo = cat;
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            renderEventos();
        };

        carregarEventos();
    </script>
</body>

</html>
