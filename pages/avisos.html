<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avisos — Jovens Luz do Mundo</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/svg+xml" href="img/gemini-svg.svg" />
    <style>
        @keyframes pulse {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .7
            }
        }

        .lp {
            border-radius: 8px;
            animation: pulse 1.4s ease-in-out infinite;
            background: var(--cinza-suave);
        }

        /* Filtros */
        .filtros {
            display: flex;
            gap: 8px;
            padding: 14px 16px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filtros::-webkit-scrollbar {
            display: none;
        }

        .filtro-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--azul-royal);
            background: transparent;
            color: var(--azul-royal);
            font-family: var(--fonte-titulo);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transicao);
        }

        .filtro-btn.ativo {
            background: var(--azul-royal);
            color: #fff;
        }

        /* Card aviso */
        .aviso-card {
            background: var(--branco-puro);
            border-radius: var(--raio);
            margin: 12px 16px 0;
            padding: 18px 16px;
            box-shadow: var(--sombra);
            border-left: 4px solid var(--azul-royal-claro);
            transition: var(--transicao);
        }

        .aviso-card.urgente {
            border-left-color: var(--rosa-coral-escuro);
        }

        .aviso-topo {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .aviso-titulo {
            font-family: var(--fonte-titulo);
            font-size: 15px;
            font-weight: 700;
            color: var(--texto-escuro);
            line-height: 1.3;
        }

        .aviso-texto {
            font-size: 14px;
            color: var(--cinza-texto);
            line-height: 1.75;
            white-space: pre-line;
        }

        .aviso-rodape {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .aviso-autor {
            font-size: 11px;
            color: var(--cinza-texto);
        }

        .aviso-data {
            font-size: 11px;
            color: var(--cinza-texto);
            opacity: 0.7;
        }

        .badge-urgente {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(232, 97, 122, 0.12);
            color: var(--rosa-coral-escuro);
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .badge-cat {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(27, 79, 155, 0.10);
            color: var(--azul-royal);
        }

        .vazio {
            text-align: center;
            padding: 40px 20px;
        }

        .vazio-emoji {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .vazio h4 {
            font-family: var(--fonte-titulo);
            font-size: 16px;
            color: var(--texto-escuro);
            margin-bottom: 6px;
        }

        .vazio p {
            font-size: 13px;
            color: var(--cinza-texto);
        }
    </style>
</head>

<body>

    <header class="page-header">
        <a href="../index.html" class="voltar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
                stroke-linecap="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </a>
        <h2>Avisos da Comissão</h2>
    </header>

    <div class="filtros">
        <button class="filtro-btn ativo" onclick="filtrar('todos',this)">Todos</button>
        <button class="filtro-btn" onclick="filtrar('geral',this)">Geral</button>
        <button class="filtro-btn" onclick="filtrar('liturgia',this)">Liturgia</button>
        <button class="filtro-btn" onclick="filtrar('formacao',this)">Formação</button>
        <button class="filtro-btn" onclick="filtrar('servico',this)">Serviço</button>
        <button class="filtro-btn" onclick="filtrar('comunicado',this)">Comunicado</button>
    </div>

    <div id="lista-avisos" style="padding-bottom:90px;">
        <div style="margin:16px 16px 0;">
            <div class="lp" style="height:110px;margin-bottom:12px;"></div>
            <div class="lp" style="height:110px;margin-bottom:12px;"></div>
            <div class="lp" style="height:110px;"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="../index.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg><span>Início</span></a>
        <a href="biblia.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg><span>Bíblia</span></a>
        <a href="terco.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <circle cx="12" cy="4" r="2" />
                <circle cx="20" cy="12" r="2" />
                <circle cx="12" cy="20" r="2" />
                <circle cx="4" cy="12" r="2" />
                <line x1="12" y1="6" x2="12" y2="9" />
                <line x1="15" y1="12" x2="18" y2="12" />
                <line x1="12" y1="15" x2="12" y2="18" />
                <line x1="6" y1="12" x2="9" y2="12" />
            </svg><span>Terço</span></a>
        <a href="santos.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4" />
                <path d="M6 20v-2a6 6 0 0 1 12 0v2" />
            </svg><span>Santos</span></a>
        <a href="avisos.html" class="nav-item ativo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg><span>Avisos</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBXlGzF46hAmVpm7mJ0EEKr6y2-woIClo",
            authDomain: "jovens-luz-do-mundo-608cd.firebaseapp.com",
            projectId: "jovens-luz-do-mundo-608cd",
            storageBucket: "jovens-luz-do-mundo-608cd.firebasestorage.app",
            messagingSenderId: "519874530522",
            appId: "1:519874530522:web:50adce994ab335fc6829e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const categoriasLabel = {
            geral: 'Geral', liturgia: 'Liturgia', formacao: 'Formação',
            servico: 'Serviço', financeiro: 'Financeiro', comunicado: 'Comunicado'
        };

        let todosAvisos = [];
        let filtroAtivo = 'todos';

        async function carregarAvisos() {
            try {
                const q = query(collection(db, 'avisos'), orderBy('criadoEm', 'desc'));
                const snap = await getDocs(q);
                todosAvisos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAvisos();
            } catch (e) {
                document.getElementById('lista-avisos').innerHTML =
                    '<div class="vazio"><div class="vazio-emoji">⚠️</div><h4>Erro ao carregar</h4><p>Verifique sua conexão.</p></div>';
            }
        }

        function renderAvisos() {
            const lista = document.getElementById('lista-avisos');
            const filtrados = filtroAtivo === 'todos'
                ? todosAvisos
                : todosAvisos.filter(a => a.categoria === filtroAtivo);

            if (filtrados.length === 0) {
                lista.innerHTML = `<div class="vazio">
        <div class="vazio-emoji">🔔</div>
        <h4>Nenhum aviso no momento</h4>
        <p>A comissão publicará avisos aqui quando necessário.</p>
      </div>`;
                return;
            }

            // Urgentes primeiro
            const ordenados = [...filtrados].sort((a, b) => {
                if (a.urgente && !b.urgente) return -1;
                if (!a.urgente && b.urgente) return 1;
                return 0;
            });

            lista.innerHTML = '';
            ordenados.forEach(av => {
                const data = av.criadoEm?.toDate?.()?.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }) || '—';
                const card = document.createElement('div');
                card.className = `aviso-card${av.urgente ? ' urgente' : ''}`;
                card.innerHTML = `
        <div class="aviso-topo">
          <div class="aviso-titulo">${av.titulo}</div>
          ${av.urgente ? '<span class="badge-urgente">🔴 Urgente</span>' : ''}
        </div>
        <div class="aviso-texto">${av.texto}</div>
        <div class="aviso-rodape">
          <span class="aviso-autor">✍️ ${av.autor || 'Comissão'} · <span class="badge-cat">${categoriasLabel[av.categoria] || av.categoria}</span></span>
          <span class="aviso-data">${data}</span>
        </div>`;
                lista.appendChild(card);
            });
        }

        window.filtrar = function (cat, btn) {
            filtroAtivo = cat;
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            renderAvisos();
        };

        carregarAvisos();
    </script>
</body>

</html>
